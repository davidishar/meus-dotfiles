# ==============================================================================
# CONFIGURAÇÃO UOSC
# ==============================================================================

# --- TIMELINE ---
timeline_style=line
timeline_line_width=2
timeline_size=30
# Sem persistência
timeline_persistency=
# Borda para separar do vídeo
timeline_border=0
timeline_step=5
timeline_cache=yes
timeline_heatmap=overlay

# --- BARRA DE PROGRESSO ---
progress=windowed
progress_size=2
progress_line_width=20

# --- CONTROLES ---
# Menu, Legenda, Audio, Video | Espaço | Velocidade | Espaço | Aleatório, Loop | Anterior, Playlist, Próximo | Tela Cheia
controls=menu,gap,subtitles,audio,video,gap,space,speed,space,shuffle,loop-playlist,gap,prev,items,next,gap,fullscreen
controls_size=28
controls_margin=8
controls_spacing=2
controls_persistency=

# --- VOLUME ---
volume=right
volume_size=40
volume_border=0
volume_step=1
volume_persistency=

# --- VELOCIDADE ---
speed_step=0.1
speed_step_is_factor=no
speed_persistency=

# --- MENU ---
menu_item_height=36
menu_min_width=260
menu_padding=4
menu_type_to_search=yes

# --- BARRA SUPERIOR ---
top_bar=no
top_bar_size=40
top_bar_controls=no
top_bar_title=no

# --- BORDAS E GEOMETRIA ---
window_border_size=1
border_radius=0

# Escala geral da interface
scale=1
scale_fullscreen=1
font_scale=1
text_border=0

# --- CORES E OPACIDADE (PALETA GRUVBOX / DARK FOREST) ---
# foreground=a7c080 (Verde Musgo - Destaques e barra de progresso)
# background=282828 (Fundo Carvão Escuro)
# window_border=a7c080 (Borda fina em verde musgo)
# curtain=1d2021 (Fundo ainda mais escuro para a cortina dos menus)
color=foreground=a7c080,foreground_text=282828,background=282828,background_text=d3c6aa,window_border=a7c080,curtain=1d2021,success=a7c080,error=e67e80

# Efeito Vidro (Opacidade levemente reduzida nos menus e cortinas para imitar o painel do sistema)
opacity=timeline=0.85,position=1,chapters=0.8,slider=0.85,slider_gauge=1,controls=0,speed=0.6,menu=0.85,submenu=0.85,border=1,title=1,tooltip=1,thumbnail=1,curtain=0.8,idle_indicator=0.8,audio_indicator=0.5,buffering_indicator=0.3,playlist_position=0.8,heatmap=0.4,pause_indicator=0.8

# --- ANIMAÇÕES ---
# Rápidas e secas
animation_duration=100
flash_duration=1000
proximity_in=40
proximity_out=120

# --- FONTES ---
# Não usar negrito para manter o visual "terminal"
font_bold=no

# --- COMPORTAMENTO DE ARQUIVOS ---
destination_time=playtime-remaining
time_precision=0
buffered_time_threshold=60
autohide=no
pause_indicator=flash
stream_quality_options=4320,2160,1440,1080,720,480,360,240,144

# Tipos de arquivo
video_types=3g2,3gp,asf,avi,f4v,flv,h264,h265,m2ts,m4v,mkv,mov,mp4,mp4v,mpeg,mpg,ogm,ogv,rm,rmvb,ts,vob,webm,wmv,y4m
audio_types=aac,ac3,aiff,ape,au,cue,dsf,dts,flac,m4a,mid,midi,mka,mp3,mp4a,oga,ogg,opus,spx,tak,tta,wav,weba,wma,wv
image_types=apng,avif,bmp,gif,j2k,jp2,jfif,jpeg,jpg,jxl,mj2,png,svg,tga,tif,tiff,webp
subtitle_types=aqt,ass,gsub,idx,jss,lrc,mks,pgs,pjs,psb,rt,sbv,slt,smi,sub,sup,srt,ssa,ssf,ttxt,txt,usf,vt,vtt
playlist_types=m3u,m3u8,pls,url,cue
load_types=video,audio,image
default_directory=~/
show_hidden_files=no
use_trash=no
adjust_osd_margins=yes

# --- CAPÍTULOS ---
chapter_ranges=openings:bd93f9,endings:bd93f9,ads:c54e4e80
chapter_range_patterns=openings:オープニング;endings:エンディング

# --- IDIOMAS (PRIORIDADE BRASIL) ---
# Importante para o menu de download de legendas funcionar direito
languages=pob,pt-br,pt,slang
subtitles_directory=~~/subtitles

# Desativar elementos que o Hyprland ou MPV já mostram
disable_elements=top_bar